<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图片编辑器 - 水印工具</title>
  </head>
  <body class="bg-gray-950 text-gray-100 min-h-screen font-sans antialiased">
    <div id="app" class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <!-- Header -->
      <header class="mb-8 text-center">
        <h1 class="text-4xl font-bold tracking-tight text-white sm:text-5xl">
          <span class="bg-linear-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">图片编辑器</span>
        </h1>
        <p class="mt-2 text-lg text-gray-400">为图片添加专业水印，支持批量处理</p>
      </header>

      <!-- Main grid -->
      <div class="grid grid-cols-1 gap-6 lg:grid-cols-[380px_1fr]">
        <!-- Left: Controls -->
        <section class="space-y-6">
          <!-- Watermark Card -->
          <div class="rounded-xl border border-gray-800 bg-gray-900/80 p-5 shadow-lg backdrop-blur-sm">
            <h2 class="mb-4 flex items-center gap-2 text-lg font-semibold text-white">
              <svg class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
              </svg>
              水印设置
            </h2>
            <div class="space-y-4">
              <!-- Text -->
              <div>
                <label for="watermark_text" class="mb-1 block text-sm font-medium text-gray-300">文字内容</label>
                <input type="text" id="watermark_text" value="watermark"
                  class="w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-sm text-white placeholder-gray-500 transition-colors focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 focus:outline-hidden" />
              </div>

              <!-- Font -->
              <div>
                <label for="watermark_font_family" class="mb-1 block text-sm font-medium text-gray-300">字体</label>
                <select id="watermark_font_family"
                  class="w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-sm text-white transition-colors focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 focus:outline-hidden">
                  <option value="serif">Serif (衬线)</option>
                  <option value="sans-serif" selected>Sans-serif (无衬线)</option>
                  <option value="monospace">Monospace (等宽)</option>
                </select>
              </div>

              <!-- Font Size -->
              <div>
                <div class="mb-1 flex items-center justify-between">
                  <label for="watermark_font_size" class="text-sm font-medium text-gray-300">字号</label>
                  <span id="watermark_font_size_val" class="text-xs text-gray-500">50px</span>
                </div>
                <input type="range" id="watermark_font_size" min="10" max="200" value="50"
                  class="w-full h-2 rounded-lg appearance-none cursor-pointer bg-gray-700 accent-blue-500" />
              </div>

              <!-- Color -->
              <div>
                <label for="watermark_color" class="mb-1 block text-sm font-medium text-gray-300">颜色</label>
                <div class="flex items-center gap-3">
                  <input type="color" id="watermark_color" value="#FFFFFF"
                    class="h-9 w-12 cursor-pointer rounded-lg border border-gray-700 bg-gray-800 p-0.5" />
                  <span id="watermark_color_hex" class="text-xs text-gray-500">#FFFFFF</span>
                </div>
              </div>

              <!-- Opacity -->
              <div>
                <div class="mb-1 flex items-center justify-between">
                  <label for="watermark_opacity" class="text-sm font-medium text-gray-300">透明度</label>
                  <span id="watermark_opacity_val" class="text-xs text-gray-500">20%</span>
                </div>
                <input type="range" id="watermark_opacity" min="0" max="100" value="20"
                  class="w-full h-2 rounded-lg appearance-none cursor-pointer bg-gray-700 accent-blue-500" />
              </div>

              <!-- Density -->
              <div>
                <div class="mb-1 flex items-center justify-between">
                  <label for="watermark_count" class="text-sm font-medium text-gray-300">密度</label>
                  <span id="watermark_count_val" class="text-xs text-gray-500">5</span>
                </div>
                <input type="range" id="watermark_count" min="0" max="10" value="5"
                  class="w-full h-2 rounded-lg appearance-none cursor-pointer bg-gray-700 accent-blue-500" />
              </div>

              <!-- Stroke toggle -->
              <div class="flex items-center gap-3">
                <label for="watermark_stroke" class="relative inline-flex cursor-pointer items-center">
                  <input type="checkbox" id="watermark_stroke" class="peer sr-only" />
                  <div class="h-6 w-11 rounded-full bg-gray-700 transition-colors peer-checked:bg-blue-600 after:absolute after:top-0.5 after:left-0.5 after:h-5 after:w-5 after:rounded-full after:bg-white after:transition-all peer-checked:after:translate-x-5"></div>
                </label>
                <span class="text-sm font-medium text-gray-300">空心字</span>
              </div>

              <!-- Template buttons -->
              <div class="border-t border-gray-800 pt-4">
                <p class="mb-2 text-xs font-medium uppercase tracking-wider text-gray-500">模板</p>
                <div class="flex gap-2">
                  <button id="load_watermark_options"
                    class="flex-1 rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-sm text-gray-300 transition-all hover:border-gray-600 hover:bg-gray-700 active:scale-95">
                    加载
                  </button>
                  <button id="store_watermark_options"
                    class="flex-1 rounded-lg bg-blue-600 px-3 py-2 text-sm font-medium text-white transition-all hover:bg-blue-500 active:scale-95">
                    保存
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Upload Card -->
          <div class="rounded-xl border border-gray-800 bg-gray-900/80 p-5 shadow-lg backdrop-blur-sm">
            <h2 class="mb-4 flex items-center gap-2 text-lg font-semibold text-white">
              <svg class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              选择图片
            </h2>
            <label for="source_images"
              class="flex cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed border-gray-700 bg-gray-800/50 px-4 py-8 transition-colors hover:border-blue-500/50 hover:bg-gray-800">
              <svg class="mb-2 h-8 w-8 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
              </svg>
              <p class="text-sm text-gray-400">点击上传图片</p>
              <p class="mt-1 text-xs text-gray-600">支持多选，点击图片可下载</p>
            </label>
            <input type="file" id="source_images" multiple accept="image/*" class="hidden" />
          </div>
        </section>

        <!-- Right: Preview -->
        <section class="rounded-xl border border-gray-800 bg-gray-900/80 p-5 shadow-lg backdrop-blur-sm">
          <h2 class="mb-4 flex items-center gap-2 text-lg font-semibold text-white">
            <svg class="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            图片预览
            <span id="image_count" class="ml-auto text-xs font-normal text-gray-500">0 张</span>
          </h2>
          <div id="preview_images" class="flex flex-wrap justify-center gap-4">
            <div class="flex flex-col items-center justify-center py-16 text-gray-500">
              <svg class="mb-2 h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <p>请先选择图片</p>
            </div>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
